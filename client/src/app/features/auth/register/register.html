<div class="auth-page register-page">

  <!-- Left: Illustration area -->
  <div class="auth-visual">
    <div class="img-placeholder">
      <span>Illustration coming soon</span>
    </div>
  </div>

  <!-- Right: Form Panel -->
  <div class="auth-panel">

    <!-- Mobile-only logo -->
    <a routerLink="/login" class="auth-logo mobile-logo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 2L4 7v9c0 6.6 5.1 12.8 12 14.3C22.9 28.8 28 22.6 28 16V7L16 2z" fill="#5c6ef8" opacity="0.15"/>
        <path d="M16 2L4 7v9c0 6.6 5.1 12.8 12 14.3C22.9 28.8 28 22.6 28 16V7L16 2z" stroke="#5c6ef8" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="16" cy="15" r="3.5" fill="#5c6ef8"/>
        <path d="M16 18.5v4" stroke="#5c6ef8" stroke-width="2" stroke-linecap="round"/>
      </svg>
      LoFu
    </a>

    <!-- Desktop logo top-right -->
    <a routerLink="/login" class="auth-logo auth-logo-right">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 2L4 7v9c0 6.6 5.1 12.8 12 14.3C22.9 28.8 28 22.6 28 16V7L16 2z" fill="#5c6ef8" opacity="0.15"/>
        <path d="M16 2L4 7v9c0 6.6 5.1 12.8 12 14.3C22.9 28.8 28 22.6 28 16V7L16 2z" stroke="#5c6ef8" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="16" cy="15" r="3.5" fill="#5c6ef8"/>
        <path d="M16 18.5v4" stroke="#5c6ef8" stroke-width="2" stroke-linecap="round"/>
      </svg>
      LoFu
    </a>

    <h1 class="auth-title">Sign up</h1>
    <p class="auth-subtitle">Let's get you all set up so you can access your personal account.</p>

    @if (errorMessage()) {
      <div class="alert-error" role="alert">{{ errorMessage() }}</div>
    }

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" novalidate>

      <div class="field-row">
        <div class="field-group">
          <label for="firstName">First Name</label>
          <input
            id="firstName"
            type="text"
            [(ngModel)]="firstName"
            name="firstName"
            placeholder="John"
            autocomplete="given-name"
            [disabled]="isLoading()"
          />
        </div>
        <div class="field-group">
          <label for="lastName">Last Name</label>
          <input
            id="lastName"
            type="text"
            [(ngModel)]="lastName"
            name="lastName"
            placeholder="Doe"
            autocomplete="family-name"
            [disabled]="isLoading()"
          />
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="john.doe@gmail.com"
            autocomplete="email"
            [disabled]="isLoading()"
          />
        </div>
        <div class="field-group">
          <label for="username">Username</label>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="johndoe"
            autocomplete="username"
            [disabled]="isLoading()"
          />
        </div>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input
          id="password"
          [type]="showPassword() ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••••••••••••••"
          autocomplete="new-password"
          class="has-icon"
          [disabled]="isLoading()"
        />
        <button type="button" class="field-icon" (click)="togglePassword()">
          @if (showPassword()) {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          }
        </button>
      </div>

      <div class="field-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          id="confirmPassword"
          [type]="showConfirmPassword() ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••••••••••••••"
          autocomplete="new-password"
          class="has-icon"
          [disabled]="isLoading()"
        />
        <button type="button" class="field-icon" (click)="toggleConfirmPassword()">
          @if (showConfirmPassword()) {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          }
        </button>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading()" style="margin-top: 0.5rem;">
        @if (isLoading()) { Creating account… } @else { Create account }
      </button>

    </form>

    <p class="auth-redirect">
      Already have an account?&nbsp;
      <a routerLink="/login" class="auth-link">Login</a>
    </p>

  </div>
</div>
